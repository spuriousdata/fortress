#!/bin/sh

## Bridge to a different interface than the default
#PUBLIC_IFACE=jailiface

## Bridge to two different interfaces for this jail
#PUBLIC_IFACE="jailiface otheriface"

## Tell jib to use this specific bridge (you should probably leave this blank)
#JIB_BRIDGE=

## Unset to do networking manually.
#NETWORKING=jib
## Set this if NETWORKING is unset
#CUSTOM_IFACE=epa_\${name}

## add to exec.prestart/exec.poststop in jail.conf -- MUST end with semicolon
## These will always get added, even if using jib.
#JAIL_PRESTART=
#JAIL_POSTSTOP=

## if NETWORKING is unset, then run these in exec.prestart/exec.poststop
## These will ONLY run if not using jib
#NET_PRESTART="/usr/local/scripts/mkepair.sh \${name}"
#NET_POSTSTOP="ifconfig epa_\${name} destroy"

## Use a different domain than the default
#DOMAIN=jails.example.org

## Uncomment to disable auto-rewrite of fstab and jail.conf for this jail
#AUTOGEN=

# The interface name inside the jail will always be e0b_$jailname
# DO NOT QUOTE YOUR VAULES
RC_CONF=$(cat <<EOM
ifconfig_e0b_$name=inet 192.168.99.72/24
defaultrouter=192.168.99.1
EOM
)

#EXTRA_JAIL_CONF=$(cat <<EOM
